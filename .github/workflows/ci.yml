name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python: "3.12"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: uv sync --all-extras --group dev
      - name: Pre-commit hooks
        run: uv run --with prek prek run --all-files
      - name: Tests + coverage
        run: uv run pytest
