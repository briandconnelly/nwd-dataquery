name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/nwd-dataquery
    permissions:
      id-token: write  # PyPI Trusted Publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1

  docs:
    runs-on: ubuntu-latest
    needs: build-and-publish
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - name: Generate API docs
        run: |
          uv sync --group dev
          uv run pdoc --output-directory docs/_build src/nwd_dataquery
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
