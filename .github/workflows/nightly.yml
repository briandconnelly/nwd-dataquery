name: Nightly live smoke

on:
  schedule:
    - cron: "0 13 * * *"  # 13:00 UTC daily
  workflow_dispatch:

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Install
        run: uv sync --all-extras --group dev
      - name: Run live tests
        run: uv run pytest -m live -v
      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly live tests failed on ${new Date().toISOString().slice(0,10)}`,
              body: `The nightly live-smoke job failed. Dataquery 2.0 may have drifted. See the run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['api-drift'],
            });
