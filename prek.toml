[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-yaml" },
    { id = "check-toml" },
    { id = "check-added-large-files" },
    { id = "check-merge-conflict" },
    { id = "debug-statements" },
    { id = "mixed-line-ending" },
]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.11.7"
hooks = [
    { id = "uv-lock" },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.11"
hooks = [
    { id = "ruff-check", args = ["--fix"] },
    { id = "ruff-format" },
]

[[repos]]
repo = "local"
hooks = [
    { id = "ty", name = "ty check", entry = "uv run ty check", language = "system", types_or = ["python", "toml"], pass_filenames = false, files = "^(src/|pyproject\\.toml$)" },
]
